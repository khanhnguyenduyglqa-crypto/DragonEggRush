<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dragon Egg Rush</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="ui-panel">
    <div class="title">Dragon Egg Rush</div>
    <div class="stats-row">
      <div class="stat">
        <div class="stat-label">Score</div>
        <div id="scoreValue">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">Timer</div>
        <div id="timerValue">90</div>
      </div>
      <div class="stat">
        <div class="stat-label">Combo</div>
        <div id="comboText">None</div>
      </div>
    </div>
    <button id="restartButton">Restart Game</button>
  </div>

  <div class="game-area">
    <div class="energy-panel">
      <div class="energy-meter">
        <div class="energy-title">Fire Dragon</div>
        <div class="energy-progress" id="fireEnergyProgress">0/30</div>
        <div class="energy-bar">
          <div class="energy-fill" id="fireEnergyFill"></div>
        </div>
      </div>
      <div class="energy-meter">
        <div class="energy-title">Ice Dragon</div>
        <div class="energy-progress" id="iceEnergyProgress">0/30</div>
        <div class="energy-bar">
          <div class="energy-fill" id="iceEnergyFill"></div>
        </div>
        <div class="frozen-time-countdown" style="display: none;"></div>
      </div>
      <div class="energy-meter">
        <div class="energy-title">Leaf Dragon</div>
        <div class="energy-progress" id="leafEnergyProgress">0/30</div>
        <div class="energy-bar">
          <div class="energy-fill" id="leafEnergyFill"></div>
        </div>
        <div class="blessing-countdown" style="display: none;"></div>
      </div>
      <div class="energy-meter">
        <div class="energy-title">Earth Dragon</div>
        <div class="energy-progress" id="earthEnergyProgress">0/30</div>
        <div class="energy-bar">
          <div class="energy-fill" id="earthEnergyFill"></div>
        </div>
      </div>
    </div>
    <div id="gameContainer"></div>
  </div>

  <div id="gameOverOverlay" class="overlay hidden">
    <div class="overlay-box">
      <h2>Game Over</h2>
      <p>Your final score:</p>
      <p id="finalScore">0</p>
      <button id="overlayRestart">Play Again</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
  <script src="game.js"></script>
</body>
</html>
