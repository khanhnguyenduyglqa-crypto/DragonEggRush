<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dragon Egg Rush</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="ui-panel">
    <div class="title">Dragon Egg Rush</div>
    <div class="stats-row">
      <div class="stat">
        <div class="stat-label">Score</div>
        <div id="scoreValue">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">Timer</div>
        <div id="timerValue">90</div>
      </div>
      <div class="stat">
        <div class="stat-label">Combo</div>
        <div id="comboText">None</div>
      </div>
    </div>
    <button id="restartButton">Restart Game</button>
  </div>

  <div class="game-area">
    <div class="energy-panel">
      <div class="energy-meter dragon-energy-row">
        <!-- Dragon portrait assets live in assets/dragons/. Replace placeholder images by dropping PNG files with the expected names. -->
        <div class="dragon-portrait-slot fire-portrait">
          <img src="assets/dragons/fire_dragon.png" alt="Fire Dragon" onerror="this.hidden = true; this.nextElementSibling.hidden = false;" />
          <span class="dragon-fallback" hidden>🔥</span>
        </div>
        <div class="energy-card fire-energy-card">
          <div class="energy-card-header">
            <div>
              <div class="energy-title"><span class="element-icon">🔥</span> Fire Dragon</div>
            </div>
            <span class="dragon-ready-badge" id="fireReadyBadge" hidden>READY</span>
            <span class="info-icon">i</span>
          </div>
          <div class="energy-bar-row">
            <div class="energy-bar">
              <div class="energy-fill fire-energy-fill" id="fireEnergyFill"></div>
            </div>
            <div class="energy-progress" id="fireEnergyProgress">0/30</div>
          </div>
        </div>
      </div>
      <div class="energy-meter dragon-energy-row">
        <div class="dragon-portrait-slot ice-portrait">
          <img src="assets/dragons/ice_dragon.png" alt="Ice Dragon" onerror="this.hidden = true; this.nextElementSibling.hidden = false;" />
          <span class="dragon-fallback" hidden>❄️</span>
        </div>
        <div class="energy-card ice-energy-card">
          <div class="energy-card-header">
            <div>
              <div class="energy-title"><span class="element-icon">❄️</span> Ice Dragon</div>
            </div>
            <span class="dragon-ready-badge" id="iceReadyBadge" hidden>READY</span>
            <span class="info-icon">i</span>
          </div>
          <div class="energy-bar-row">
            <div class="energy-bar">
              <div class="energy-fill ice-energy-fill" id="iceEnergyFill"></div>
            </div>
            <div class="energy-progress" id="iceEnergyProgress">0/30</div>
          </div>
          <div class="frozen-time-countdown" style="display: none;"></div>
        </div>
      </div>
      <div class="energy-meter dragon-energy-row">
        <div class="dragon-portrait-slot leaf-portrait">
          <img src="assets/dragons/leaf_dragon.png" alt="Leaf Dragon" onerror="this.hidden = true; this.nextElementSibling.hidden = false;" />
          <span class="dragon-fallback" hidden>🌿</span>
        </div>
        <div class="energy-card leaf-energy-card">
          <div class="energy-card-header">
            <div>
              <div class="energy-title"><span class="element-icon">🌿</span> Leaf Dragon</div>
            </div>
            <span class="dragon-ready-badge" id="leafReadyBadge" hidden>READY</span>
            <span class="info-icon">i</span>
          </div>
          <div class="energy-bar-row">
            <div class="energy-bar">
              <div class="energy-fill leaf-energy-fill" id="leafEnergyFill"></div>
            </div>
            <div class="energy-progress" id="leafEnergyProgress">0/30</div>
          </div>
          <div class="blessing-move-counter" style="display: none;"></div>
        </div>
      </div>
      <div class="energy-meter dragon-energy-row">
        <div class="dragon-portrait-slot earth-portrait">
          <img src="assets/dragons/earth_dragon.png" alt="Earth Dragon" onerror="this.hidden = true; this.nextElementSibling.hidden = false;" />
          <span class="dragon-fallback" hidden>🪨</span>
        </div>
        <div class="energy-card earth-energy-card">
          <div class="energy-card-header">
            <div>
              <div class="energy-title"><span class="element-icon">🪨</span> Earth Dragon</div>
            </div>
            <span class="dragon-ready-badge" id="earthReadyBadge" hidden>READY</span>
            <span class="info-icon">i</span>
          </div>
          <div class="energy-bar-row">
            <div class="energy-bar">
              <div class="energy-fill earth-energy-fill" id="earthEnergyFill"></div>
            </div>
            <div class="energy-progress" id="earthEnergyProgress">0/30</div>
          </div>
        </div>
      </div>
    </div>
    <div id="gameContainer"></div>
  </div>

  <div id="gameOverOverlay" class="overlay hidden">
    <div class="overlay-box">
      <h2>Game Over</h2>
      <p>Your final score:</p>
      <p id="finalScore">0</p>
      <button id="overlayRestart">Play Again</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
  <script src="game.js"></script>
</body>
</html>
